<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>알라딘 베스트 셀러 모음</h1>
<div th:each="book : ${books}">
    <h2 th:text="${book.title}"></h2><br>
    <img th:if="${book.bookImage != null}" th:src="${book.bookImage}" alt="책 이미지" width="120"/><br>
    <p><strong>저자:</strong> <span th:text="${book.author}"></span></p><br>
    <p><strong>가격:</strong> <span th:text="${book.price}"></span></p><br>

    <hr/>
</div>

</body>
</html>

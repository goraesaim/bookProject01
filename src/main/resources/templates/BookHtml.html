<h1>알라딘 베스트 셀러 모음</h1>

<div id="category-buttons">
    <button th:onclick="'loadCategory(\'국베\')'">국베</button>
    <button th:onclick="'loadCategory(\'신간\')'">신간</button>
    <button th:onclick="'loadCategory(\'외베\')'">외베</button>
</div>
<div>
    <input type="text" id="titleInput" name="title" placeholder="책 제목" />
    <input type="text" id="authorInput" name="author" placeholder="저자" />
    <input type="text" id="publisherInput" name="price" placeholder="출판사" />
</div>
<div>
    <form th:action="@{/view}" method="post">
    <input type="text" name="message" placeholder="메시지를 입력하세요" />
    <button type="submit">전송</button>
    </form>
</div>
<div th:if="${selbooks}" th:replace="BookSelect :: bookSelect"></div>

<div id="book-list"></div>

<script>
    function loadCategory(category) {
        fetch(`/books/category?keyword=${category}`)
            .then(response => response.text())
            .then(html => {
                document.getElementById('book-list').innerHTML = html;
            });
    }
    function setBookInfo(title, author, publisher) {
        document.getElementById("titleInput").value = title;
        document.getElementById("authorInput").value = author;
        document.getElementById("publisherInput").value = publisher;
    }

</script>

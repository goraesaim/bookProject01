<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>공지사항 상세</title>
    <link rel="stylesheet" th:href="@{/css/detail.css}">
</head>
<body>
<div class="detail-container">
    <h1 th:text="${board.title}">공지사항 제목</h1>
    <p class="writer">작성자: <span th:text="${board.writer}">작성자 이름</span></p>
    <p class="date">작성일: <span th:text="${#temporals.format(board.indate, 'yyyy-MM-dd')}">2025-11-08</span></p>
    <p class="views">조회수: <span th:text="${board.count}">0</span></p>

    <div class="content" th:utext="${board.content}"></div>

    <div class="file-section" th:if="${board.sfile != null}">
        <p>첨부 파일:
            <a th:href="@{'/upload/' + ${board.sfile}}" th:text="${board.ofile}">파일명</a>
        </p>
    </div>
<!--
    <div class="list-top-btn" sec:authorize="hasRole('ADMIN')">
        <button class="btn" th:onclick="'location.href=\'/noti/add\';'">작성</button>
    </div> -->
    <!-- 업로드 이미지 표시 -->
    <p th:if="${board.sfile != null}">
        <img th:src="@{/uploads/{file}(file=${board.sfile})}"
             alt="첨부 이미지"
             style="max-width:400px;"/>
    </p>


    <div class="btn-box">
        <button class="btn" onclick="location.href='/noti/list'">목록으로</button>


        <!-- 로그인한 ADMIN만 보이도록 -->
        <div sec:authorize="hasRole('ADMIN')">
            <a class="btn" th:href="@{/noti/noticeModify/{idx}(idx=${board.idx})}">수정</a>
            <a class="btn" th:href="@{/noti/delete/{idx}(idx=${board.idx})}">삭제</a>
        </div>
    </div>
</div>

<script th:src="@{/js/detail.js}"></script>
</body>
</html>

<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout.html}">
<div layout:fragment="content">
    <div class="sub_page">
        <div class="inner">
            <div class="alert_box type2">
                <div class="con">
                    <div class="txt">
                        <img src="../img/sub/order.png" class="ico"/>
                        <h3>주문 완료이 완료되었습니다.</h3>
                        <p>
                            주문 번호는 <span th:text="${orderNo}"></span> 입니다.
                        </p>
                    </div>
                    <ul class="list__info">
                        <li><span>총 수량</span>
                            <p th:text="${totalQuantity} + '개'"></p></li>
                        <li><span>총 금액</span>
                            <p th:text="${#numbers.formatInteger(totalPrice,3,'COMMA')} + '원'"></p></li>
                    </ul>
                    <div class="cart__itm__list type2">
                        <div th:each="history : ${histories}" class="cart__list__itm type2">
                            <div class="img">
                                <div>
                                    <img th:src="${history.product.bookImageUrl != null} ? ${history.product.bookImageUrl} : '/img/main/sample.jpg'"/>
                                </div>
                            </div>
                            <div>
                                <a href="#" class="title" th:text="${history.product.title}"></a>
                                <p class="author" th:text="${history.product.author}"></p>
<!--                                <span class="price"-->
<!--                                      th:text="${#numbers.formatInteger(item.product.price,3,'COMMA')} + '원'"></span>-->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout.html}">
<div layout:fragment="content">
    <div class="sub_page pay_page">
        <div class="inner">
            <div class="sub_top_ttl">
                <h3>주문서작성/결제</h3>
            </div>
            <div class="cart_wrap">
                <form class="flex__form">
                    <div class="cart_detail">
                        <div class="cart__itm__list">
                            <div class="cart__list__itm">
                                <div class="img">
                                    <img src="../img/main/sample.jpg" alt="" />
                                </div>
                                <div>
                                    <a href="#" class="title"
                                    >아주오래 앉아있는 사람을 위한책</a
                                    >
                                    <p class="author">저자저자저자</p>
                                    <span class="price">3,000원</span><span>119,000</span>
                                </div>
                            </div>
                            <div class="cart__list__itm">
                                <div class="img">
                                    <img src="../img/main/sample.jpg" alt="" />
                                </div>
                                <div>
                                    <a href="#" class="title"
                                    >아주오래 앉아있는 사람을 위한책</a
                                    >
                                    <p class="author">저자저자저자</p>
                                    <span class="price">3,000원</span><span>119,000</span>
                                </div>
                            </div>
                        </div>
                        <div class="pay__user__info">
                            <h5>주문자 정보</h5>
                            <div>
                                <div>
                                    <span>이름</span>
                                    <input type="text" value="이름" readonly />
                                </div>
                                <div>
                                    <span>주소</span>
                                    <input type="text" value="부산 진구" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="cart_info_wrap">
                        <div class="cart_info">
                            <h3>주문 확인</h3>
                            <div>
                                <span>상품금액</span>
                                <p>10,000 <span>원</span></p>
                            </div>
                            <div>
                                <span>상품 수량</span>
                                <p>2 <span>개</span></p>
                            </div>
                            <div class="total">
                                <span>최종 결제금액</span>
                                <p>3,0000 <span>원</span></p>
                            </div>
                            <button onclick="location.href='/order/complete'"
                                    type="button"
                                    name="orderItem"
                                    value="상품ID"
                                    class="cart__list__orderbtn"
                            >
                                결제하기
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

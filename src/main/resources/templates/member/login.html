<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout.html}">
<div layout:fragment="content">
    <div class="sub_page member_page">
        <div class="inner">
            <div class="sub_top_ttl">
                <h3>로그인</h3>
            </div>
            <div class="form_box">
                <form action="/loginProcess" method="post" class="member_form">
                    <div>
                        <span>아이디</span>
                        <input type="text" name="username" placeholder="아이디를 입력해주세요" class="input_id">
                    </div>
                    <div>
                        <span>비밀번호</span>
                        <input type="password" name="password" placeholder="아이디를 입력해주세요" class="input_pw">
                    </div>
                    <input type="submit" value="로그인" class="submit_btn">
                    <div class="bottom">
                        <p>아직 회원이 아니신가요?</p>
                        <a href="../member/join.html">회원가입</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

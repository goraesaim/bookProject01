<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout.html}">
<div layout:fragment="content">
    <div class="sub_page member_page">
        <div class="inner">
            <div class="sub_top_ttl">
                <h3>회원가입</h3>
            </div>
            <div class="form_box">
                <form action="/member/register" method="post" class="member_form">
                    <div>
                        <span>아이디</span>
                        <div class="flex_box">
                            <input type="text" id="username" name="username" placeholder="아이디를 입력해주세요" class="input_id">
                            <button type="button" id="checkBtn">아이디 중복체크</button>
                        </div>
                        <p id="checkMessage" style="color:red; display:none; font-size: 14px"></p>
                    </div>
                    <div>
                        <span>비밀번호</span>
                        <input type="password" id="password" name="password" placeholder="비밀번호를 입력해주세요" class="input_pw">
                    </div>
                    <div>
                        <span>비밀번호 확인</span>
                        <input type="password" id="confirmPassword" placeholder="비밀번호를 입력해주세요" class="input_pw">
                        <p id="passwordMessage" style="color:red; display:none; font-size: 14px" >비밀번호가 일치하지 않습니다.</p>
                    </div>
                    <div>
                        <span>이름</span>
                        <input type="text" name="name" placeholder="이름을 입력해주세요">
                    </div>
                    <div>
                        <span>주소</span>
                        <input type="text" name="address" placeholder="주소를 입력해주세요">
                    </div>
                    <input type="submit" id="subBtn" value="회원가입" class="submit_btn" disabled>
                </form>
            </div>
        </div>
    </div>
</div>
<div layout:fragment="script">
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const usernameInput = document.getElementById("username");
            const checkBtn = document.getElementById("checkBtn");
            const checkMessage = document.getElementById("checkMessage");

            const password = document.getElementById("password");
            const confirmPassword = document.getElementById("confirmPassword");
            const message = document.getElementById("passwordMessage");
            const submitBtn = document.getElementById("subBtn");

            checkBtn.addEventListener("click", function () {
                const username = usernameInput.value.trim();
                if (username === "") {
                    checkMessage.textContent = "아이디를 입력해주세요.";
                    checkMessage.style.color = "red";
                    checkMessage.style.display = "block";
                    return;
                }
                fetch(`/member/check-username?username=${encodeURIComponent(username)}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.exists) {
                            checkMessage.textContent = "이미 사용 중인 아이디입니다.";
                            checkMessage.style.color = "red";
                        } else {
                            checkMessage.textContent = "사용 가능한 아이디입니다.";
                            checkMessage.style.color = "green";
                        }
                        checkMessage.style.display = "block";
                    })
                    .catch(error => {
                        checkMessage.textContent = "서버 오류가 발생했습니다.";
                        checkMessage.style.color = "red";
                        checkMessage.style.display = "block";
                    });
            });

            function validatePassword() {
                if (confirmPassword.value === "") {
                    message.style.display = "none";
                    submitBtn.disabled = true;
                    return;
                }

                if (password.value === confirmPassword.value) {
                    message.style.display = "none";
                    submitBtn.disabled = false;
                } else {
                    message.style.display = "block";
                    submitBtn.disabled = true;
                }
            }

            password.addEventListener("input", validatePassword);
            confirmPassword.addEventListener("input", validatePassword);
        });
    </script>
</div>

<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout.html}">
<div layout:fragment="content">
    <div class="sub_page">
        <div class="inner">
            <div class="sub_top_ttl">
                <h3>해외 도서</h3>
            </div>
            <div class="board_search">
                <form th:action="@{/foreign/search}" method="get">
                    <div class="search_con">
                        <div class="select_box">
                            <select name="type">
                                <option value="ta" th:selected="${type == 'ta'}">전체</option>
                                <option value="t" th:selected="${type == 't'}">제목</option>
                                <option value="a" th:selected="${type == 'a'}">저자</option>
                            </select>
                        </div>
                        <input type="hidden" name="bookType" value="외베">
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="키워드를 입력해주세요">
                        <input type="submit" value="">
                    </div>
                </form>
            </div>
            <div class="board_info">
                <div>
                    <p>총 <span class="count" th:text="${books.size()}"></span> 개의 상품</p>
                </div>
                <div class="sort_btn_wrap">
                    <button class="on" type="button">최신순</button>
                    <button type="button">인기순</button>
                </div>
            </div>
            <div class="product_wrap">
                <ul class="product_list">
                    <li class="itm" th:each="book : ${books}">
                        <a th:href="@{/foreign/detail(bno=${book.bno})}">
                            <div class="img">
                                <img th:src="${book.bookImage}"  alt="">
                            </div>
                            <p class="title" th:text="${book.title}"></p>
                            <span class="author" th:text="${book.author}"></span>
                            <p class="price" th:text="${book.price}"></p>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="pagenation_wrap">

                <!-- Paging script goPage() -->
                <p class="pagenation"><a href="#" data-role="goPage" data-page="1" class="first angle-left-thin" aria-label="Previous"></a><a href="#" data-role="goPage" class="arrow-left" data-page="1" aria-label="dec"></a><strong href="#" class="active" data-role="goPage" data-page="1">1</strong><a href="#" data-role="goPage" data-page="2">2</a><a href="#" data-role="goPage" data-page="3">3</a><a href="#" data-role="goPage" data-page="4">4</a><a href="#" data-role="goPage" data-page="5">5</a><a href="#" data-role="goPage" data-page="6">6</a><a href="#" data-role="goPage" data-page="7">7</a><a href="#" data-role="goPage" data-page="8">8</a><a href="#" data-role="goPage" data-page="9">9</a><a href="#" data-role="goPage" data-page="10">10</a><a href="#" data-role="goPage" class="arrow-right" data-page="2" aria-label="inc"></a><a href="#" data-role="goPage" data-page="11" class="last angle-right-thin" aria-label="Next"></a></p>
            </div>
        </div>
    </div>
</div>

<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout.html}">
<div layout:fragment="content">
    <div class="sub_page">
        <div class="inner">
            <div class="sub_top_ttl">
                <h3>국내 도서</h3>
            </div>
            <div class="board_search">
                <form th:action="@{/domestic/search}" method="get">
                    <div class="search_con">
                        <div class="select_box">
                            <select name="type">
                                <option value="ta" th:selected="${type == 'ta'}">전체</option>
                                <option value="t" th:selected="${type == 't'}">제목</option>
                                <option value="a" th:selected="${type == 'a'}">저자</option>
                            </select>
                        </div>
                        <input type="hidden" name="bookType" value="국베">
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="키워드를 입력해주세요">
                        <input type="submit" value="">
                    </div>
                </form>
            </div>
            <div class="board_info">
                <div>
                    <p>총 <span class="count" th:text="${books.size()}"></span> 개의 상품</p>
                </div>
                <div class="sort_btn_wrap">
                    <button class="on" type="button">최신순</button>
                    <button type="button">인기순</button>
                </div>
            </div>
            <div class="product_wrap">
                <ul class="product_list">
                    <li class="itm" th:each="book : ${books}">
                        <a th:href="@{/domestic/detail(bno=${book.bno})}">
                            <div class="img">
                                <img th:src="${book.bookImage}"  alt="">
                            </div>
                            <p class="title" th:text="${book.title}"></p>
                            <span class="author" th:text="${book.author}"></span>
                            <p class="price" th:text="${book.price}"></p>
                        </a>
                    </li>
<!--                    <li >-->
<!--                        <hr>-->

            </div>
            <div class="pagenation_wrap">

                <!-- Paging script goPage() -->

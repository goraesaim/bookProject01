<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>알라딘 베스트 셀러 모음</h1>

<div th:fragment="bookList">
    <ul>
        <li th:each="book : ${books}">
            <hr>
            <img th:src="${book.bookImage}" width="100" /><br>
            <strong th:text="${book.title}"></strong> -
            <span th:text="${book.author}"></span>
            <p th:text="${book.category}"></p>
            <p><strong>가격:</strong> <span th:text="${book.price}"></span></p><br>
        </li>
    </ul>
</div>

<script>
    function loadCategory(category) {
        fetch(`/books/category?keyword=${category}`)
            .then(response => response.text())
            .then(html => {
                document.getElementById('book-list').innerHTML = html;
            });
    }
</script>

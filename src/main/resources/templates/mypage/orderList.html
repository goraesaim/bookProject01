<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout.html}">
<div layout:fragment="content">
    <div class="sub_page my_page">
        <div class="inner">
            <div class="sub_top_ttl">
                <h3>마이페이지</h3>
            </div>
            <div class="flex__box">
                <div class="sub__nav__wrap">
                    <div class="sub__nav">
                        <a href="/mypage/info" class="top">
                            <p>반갑습니다. <br>
                                <span th:text="${user.username + '님'}"></span>
                            </p>
                        </a>
                        <ul class="sub__nav__list">
                            <li class="sub__nav__itm">
                                <h3>판매</h3>
                                <a href="/mypage/writeList">작성한 글</a>
                                <a href="/mypage/saleComplete" >판매 완료 도서</a>
                            </li>
                            <li class="sub__nav__itm">
                                <h3>구매</h3>
                                <a href="/mypage/orderList" class="on">나의 주문내역</a>
                                <a href="/mypage/payManagement">결제수단관리</a>
                            </li>
                            <li class="sub__nav__itm">
                                <a href="/mypage/withdrawal">계정탈퇴</a>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="con">
                    <div class="board_info">
                        <h3 class="mypage__sub__tit type2">나의 주문내역</h3>
                        <div>
                            <p>총 <span class="count" th:text="${orderCount}">0</span> 개의 주문내역</p>
                        </div>
                    </div>
                    <table class="order__list">
                        <thead>
                            <tr>
                                <td>주문번호</td>
                                <td>이미지</td>
                                <td>상품정보</td>
                                <td>가격</td>
                            </tr>
                        </thead>
                        <tbody th:each="entry : ${orderGroup}">
                            <tr th:each="item, iterStat : ${entry.value}">
                                <td class="order_info" th:if="${iterStat.first}" th:rowspan="${#lists.size(entry.value)}">
                                    <span class="date" th:text="${#temporals.format(item.created_at, 'yyyy-MM-dd')}"></span>
                                    <span class="order_num" th:text="${entry.key}"></span>
                                </td>
                                <td class="order_thum">
                                    <div class="img">
                                        <img th:src="${item.bookImageUrl != null} ? ${item.bookImageUrl} : '/img/main/sample.jpg'" alt="도서 이미지">
                                    </div>
                                </td>
                                <td class="content">
                                    <h3 class="title">[[${item.title}]]</h3><br>
                                    <span class="author">[[${item.author}]]</span><br>
                                    <span class="publisher">[[${item.publisher}]]</span>
                                </td>
                                <td class="price" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + '원'"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
